# Sleepy-TF 配置文件
# 配置文档: doc/config.md

# ===== 基本配置 =====
main:
  # 数据库地址
  database: 'sqlite:///../data/data.db'
  
  # 监听地址 (0.0.0.0 表示监听所有接口)
  host: '0.0.0.0'
  
  # 服务监听端口
  port: 9010
  
  # 是否启用 Flask 调试模式
  debug: true
  
  # 日志文件目录 (留空禁用)
  log_file: ''
  
  # 控制台输出日志是否有颜色及 Emoji 图标
  colorful_log: true
  
  # 时区设置
  timezone: 'Asia/Shanghai'
  
  # 密钥 (更新状态时需要，请勿泄露)
  secret: 'Wnnz3tz!'
  
  # 静态资源缓存时间 (秒)
  cache_age: 1200
  
  # 允许跨域请求的域名 (* 表示允许所有)
  cors_origins: '*'
  
  # 是否启用 https
  https: false
  
  # ssl 证书路径
  ssl_cert: 'data/cert.pem'
  
  # ssl 密钥路径
  ssl_key: 'data/key.pem'

# ===== 页面配置 =====
page:
  # 你的名字 (将显示在网页中)
  name: 'TF注册表'
  
  # 页面标题
  title: '看看TF注册表在干嘛'
  
  # 页面详情 (用于 SEO)
  desc: "User's Online Status Page"
  
  # 页面图标 url
  favicon: '/favicon.ico'
  
  # 背景图片 url / api
  background: 'https://imgapi.siiway.top/image'
  
  # 更多信息链接的提示
  learn_more_text: 'GitHub Repo'
  
  # 更多信息链接的目标
  learn_more_link: 'https://github.com/sleepy-project/sleepy'
  
  # 额外内容 (可插入统计代码/备案号等)
  more_text: ''
  
  # 页面主题
  theme: 'default'

# ===== 状态配置 =====
status:
  # 设备状态截取文字数 (0 禁用)
  device_slice: 50
  
  # 网页刷新间隔 (毫秒)
  refresh_interval: 5000
  
  # 锁定设备未在使用时的提示
  not_using: '未在使用'
  
  # 是否对设备进行排序
  sorted: false
  
  # 是否优先显示正在使用设备
  using_first: false
  
  # 状态列表
  status_list:
    - name: '活着'
      desc: '目前在线，可以通过任何可用的联系方式联系本人。'
      color: 'awake'
    - name: '下线了'
      desc: '睡了或其他原因不在线，紧急情况请使用电话联系。'
      color: 'sleeping'

# ===== 统计配置 =====
metrics:
  # 是否启用统计功能
  enabled: true
  
  # 将计入统计的路径列表
  allow_list:
    - '/'
    - '/api/status/query'
    - '/api/status/list'
    - '/api/status/set'
    - '/api/device/set'
    - '/api/device/remove'
    - '/api/device/clear'
    - '/api/device/private'
    - '/api/status/events'
    - '/api/metrics'
    - '/api/meta'
    - '/robots.txt'
    - '/favicon.ico'
    - '[static]'

# ===== 插件配置 =====
# 启用的插件列表
plugins_enabled:
  - 'v4_compatible'
  - 'theme_detect'

# 插件配置
plugin: {}
